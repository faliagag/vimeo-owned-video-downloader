<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Descargador Vimeo propio</title>
  <link rel="stylesheet" href="css/ui.css">
</head>
<body>
  <main class="wrap">
    <h1>Descargador Vimeo</h1>
    <p class="muted">Detecta iframes de Vimeo en la pestaña actual.</p>
    <div class="card">
      <div class="row between"><span>Dominio actual</span><strong id="currentDomain">-</strong></div>
      <div class="row between"><span>Estado</span><strong id="status">Cargando&hellip;</strong></div>
      <div class="row between"><span>Videos detectados</span><strong id="count">0</strong></div>
    </div>
    <button id="addDomainBtn" style="display:none;width:100%;margin:8px 0;"></button>
    <div class="actions">
      <button id="refreshBtn">Actualizar</button>
      <a class="button secondary" href="options.html" target="_blank">Opciones</a>
    </div>
    <div id="list" class="list"></div>
    <p class="foot">Úsala solo con contenido propio o autorizado.</p>
  </main>
  <script src="js/popup.js"></script>
</body>
</html>
