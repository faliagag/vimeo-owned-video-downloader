<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vimeo Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 120px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f0f10;
      color: #e8e8e8;
    }
    .header {
      background: linear-gradient(135deg, #1ab7ea 0%, #0d8bb5 100%);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header svg { flex-shrink: 0; }
    .header-text h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .header-text p { font-size: 11px; color: rgba(255,255,255,0.8); }
    .body { padding: 12px 14px; }
    .state-empty, .state-loading {
      text-align: center;
      padding: 24px 16px;
      color: #888;
    }
    .state-empty .icon { font-size: 32px; margin-bottom: 8px; }
    .state-empty p { font-size: 12px; line-height: 1.5; }
    .hint { color: #555; margin-top: 6px !important; }
    .state-loading { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #333;
      border-top-color: #1ab7ea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      margin-bottom: 8px;
    }
    .video-title {
      font-size: 13px;
      font-weight: 600;
      color: #e8e8e8;
      margin-bottom: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .video-list { display: flex; flex-direction: column; gap: 6px; }
    .video-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1c1c1e;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      padding: 10px 12px;
      transition: border-color 0.15s;
    }
    .video-item:hover { border-color: #1ab7ea; }
    .video-info {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }
    .quality-badge {
      background: #1ab7ea;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      min-width: 40px;
      text-align: center;
    }
    .quality-badge.hls { background: #9b59b6; }
    .quality-badge.dash { background: #e67e22; }
    .video-meta { font-size: 11px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-download {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #1ab7ea;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .btn-download:hover { background: #0d8bb5; }
    .btn-download.copy {
      background: #2a2a2e;
      color: #1ab7ea;
      border: 1px solid #1ab7ea;
    }
    .btn-download.copy:hover { background: #1ab7ea; color: #fff; }
    .actions {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #2a2a2e;
    }
    .btn-action {
      flex: 1;
      padding: 7px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #2a2a2e;
      background: #1c1c1e;
      color: #888;
      transition: all 0.15s;
    }
    .btn-action:hover { border-color: #1ab7ea; color: #1ab7ea; }
    .btn-action.danger:hover { border-color: #e74c3c; color: #e74c3c; }
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #27ae60;
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="12" fill="rgba(255,255,255,0.2)"/>
      <polygon points="10,8 10,16 17,12" fill="white"/>
    </svg>
    <div class="header-text">
      <h1>Vimeo Downloader</h1>
      <p>Descarga videos de Vimeo</p>
    </div>
  </div>
  <div class="body" id="body">
    <div class="state-loading">
      <div class="spinner"></div>
      <span>Buscando videos...</span>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="js/popup.js"></script>
</body>
</html>
