<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vimeo Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<header>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="#60a5fa" stroke="none"/></svg>
  <h1>Vimeo Owned Downloader</h1>
  <span class="ver">v8.3</span>
</header>

<div class="section">
  <label>Dominio permitido</label>
  <div class="row">
    <input type="text" id="allowedHost" placeholder="www.tudominio.com">
    <button id="saveHost" class="sm">Guardar</button>
  </div>
  <div class="info" id="hostInfo">Dominio: sin configurar</div>
</div>

<div id="status">Iniciando&hellip;</div>

<div class="hint">
  &#9432; Al iniciar una descarga aparece una <strong>barra flotante</strong> en tu p&aacute;gina.<br>
  Puedes cerrar este popup &mdash; la descarga <strong>contin&uacute;a en segundo plano</strong>.
  Si el video es HLS se guardar&aacute; como <code>.ts</code> (reproducible en VLC, etc.).
</div>

<div class="top-actions">
  <button id="refresh">&#8635; Reescanear</button>
</div>

<div id="videos"></div>

<div class="log-header">
  <span>Actividad</span>
  <button id="clearLog" class="sm sec">Limpiar</button>
</div>
<div id="log">Sin actividad.</div>

<script src="popup.js"></script>
</body>
</html>
