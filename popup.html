<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vimeo Downloader</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;font-size:13px;width:440px;background:#0f172a;color:#e2e8f0}
    header{background:#1e293b;padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #334155}
    header h1{font-size:14px;font-weight:700;color:#f1f5f9}
    .ver{font-size:10px;color:#475569;margin-left:auto;background:#0f172a;padding:2px 7px;border-radius:4px}
    .section{padding:10px 14px;border-bottom:1px solid #1e293b}
    .section label{display:block;font-size:10px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
    .row{display:flex;gap:6px;align-items:center}
    .row input{flex:1;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:6px 8px;color:#e2e8f0;font-size:12px}
    .info{font-size:10px;color:#475569;margin-top:3px}
    #status{background:#1e293b;margin:8px 14px 4px;border-radius:8px;padding:8px 10px;font-size:11px;color:#94a3b8;line-height:1.5;word-break:break-all;min-height:32px}
    .top-actions{display:flex;gap:6px;padding:6px 14px}
    .card{background:#1e293b;border:1px solid #334155;border-radius:10px;margin:0 14px 10px;padding:10px 12px}
    .card .title{font-weight:600;font-size:12px;color:#f1f5f9;margin-bottom:3px}
    .card .meta{font-size:10px;color:#475569;word-break:break-all;margin-bottom:4px}
    .tags{margin:3px 0 6px}
    .tag{display:inline-block;font-size:10px;background:#334155;color:#94a3b8;border-radius:4px;padding:1px 6px;margin:1px 2px 1px 0}
    .tag.blue{background:#1e3a5f;color:#93c5fd}
    .field{margin:5px 0}
    .field label{display:block;font-size:10px;color:#64748b;margin-bottom:2px}
    .field input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:5px;padding:5px 7px;color:#e2e8f0;font-size:11px}
    .actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
    button{background:#2563eb;color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:11px;cursor:pointer;font-weight:600;transition:background .15s}
    button:hover{background:#1d4ed8}
    button.sec{background:#334155;color:#cbd5e1} button.sec:hover{background:#475569}
    button.purple{background:#4c1d95;color:#ddd6fe} button.purple:hover{background:#5b21b6}
    button.sm{padding:4px 8px;font-size:10px}
    .hint{margin:0 14px 8px;background:#1e293b;border:1px solid #1d4ed8;border-radius:8px;padding:7px 10px;font-size:10px;color:#93c5fd;line-height:1.6}
    .log-header{display:flex;align-items:center;justify-content:space-between;padding:6px 14px 3px}
    .log-header span{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.05em}
    #log{background:#050d1a;margin:0 14px 10px;border-radius:8px;padding:8px 10px;font-family:monospace;font-size:10px;color:#475569;max-height:90px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
    #videos{padding-top:4px}

    /* estado descargando en boton */
    button[data-state="loading"]{background:#1e3a5f;color:#93c5fd;cursor:not-allowed;pointer-events:none}
    button[data-state="ok"]{background:#14532d;color:#86efac;cursor:not-allowed;pointer-events:none}
    button[data-state="err"]{background:#7f1d1d;color:#fca5a5;cursor:not-allowed;pointer-events:none}
  </style>
</head>
<body>
<header>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="#60a5fa" stroke="none"/></svg>
  <h1>Vimeo Owned Downloader</h1>
  <span class="ver">v8.2</span>
</header>

<div class="section">
  <label>Dominio permitido</label>
  <div class="row">
    <input type="text" id="allowedHost" placeholder="www.tudominio.com">
    <button id="saveHost" class="sm">Guardar</button>
  </div>
  <div class="info" id="hostInfo">Dominio: sin configurar</div>
</div>

<div id="status">Iniciando&hellip;</div>

<div class="hint">
  &#9432; Al iniciar una descarga aparece una <strong>barra flotante</strong> en tu p&aacute;gina.<br>
  Puedes cerrar este popup &mdash; la descarga <strong>contin&uacute;a en segundo plano</strong>.
  Si el video es HLS se guardar&aacute; como <code>.ts</code> (reproducible en VLC, etc.).
</div>

<div class="top-actions">
  <button id="refresh">&#8635; Reescanear</button>
</div>

<div id="videos"></div>

<div class="log-header">
  <span>Actividad</span>
  <button id="clearLog" class="sm sec">Limpiar</button>
</div>
<div id="log">Sin actividad.</div>

<script src="popup.js"></script>
</body>
</html>
