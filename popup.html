<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vimeo Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 340px;
      background: #0f0f0f;
      color: #e8e8e8;
      font-size: 13px;
    }

    .header {
      background: #1a1a1a;
      padding: 14px 16px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: #1ab7ea;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg { color: #fff; }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .header-sub {
      font-size: 11px;
      color: #666;
      margin-top: 1px;
    }

    .status-bar {
      padding: 10px 16px;
      background: #161616;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #888;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }
    .status-dot.active { background: #22c55e; }
    .status-dot.searching { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .content { padding: 12px 16px; }

    .video-title {
      font-size: 13px;
      font-weight: 500;
      color: #ddd;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .quality-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .quality-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .quality-item:hover { background: #252525; border-color: #1ab7ea44; }
    .quality-item:active { transform: scale(0.99); }

    .quality-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quality-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      background: #2a2a2a;
      color: #aaa;
      letter-spacing: 0.3px;
    }
    .quality-badge.hd { background: #1ab7ea22; color: #1ab7ea; }
    .quality-badge.fhd { background: #6366f122; color: #818cf8; }
    .quality-badge.uhd { background: #f59e0b22; color: #f59e0b; }

    .quality-size { font-size: 11px; color: #555; }
    .quality-ext { font-size: 11px; color: #444; }

    .download-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: #1ab7ea;
      color: #fff;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .download-btn:hover { background: #15a3d1; }
    .download-btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    .empty-state {
      text-align: center;
      padding: 28px 16px;
      color: #555;
    }

    .empty-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 12px;
      opacity: 0.3;
    }

    .empty-title {
      font-size: 13px;
      color: #777;
      margin-bottom: 6px;
    }

    .empty-hint {
      font-size: 11px;
      color: #444;
      line-height: 1.5;
    }

    .refresh-btn {
      margin-top: 14px;
      padding: 7px 16px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .refresh-btn:hover { background: #252525; color: #aaa; }

    .loading-state {
      text-align: center;
      padding: 28px 16px;
      color: #555;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #222;
      border-top-color: #1ab7ea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #222;
      border: 1px solid #333;
      color: #ccc;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success { border-color: #22c55e44; color: #22c55e; }
    .toast.error { border-color: #ef444444; color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Vimeo Downloader</div>
      <div class="header-sub">Download videos you have access to</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Initializing...</span>
  </div>

  <div class="content" id="content">
    <div class="loading-state">
      <div class="spinner"></div>
      <div style="font-size:12px;color:#555">Looking for video...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
