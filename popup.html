<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vimeo Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 13px; width: 420px; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 10px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #334155; }
    header h1 { font-size: 14px; font-weight: 700; color: #f1f5f9; }
    header span { font-size: 11px; color: #64748b; margin-left: auto; }
    .section { padding: 10px 14px; border-bottom: 1px solid #1e293b; }
    .section label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
    .row { display: flex; gap: 6px; align-items: center; }
    .row input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 6px 8px; color: #e2e8f0; font-size: 12px; }
    .row input:focus { outline: none; border-color: #60a5fa; }
    .info { font-size: 11px; color: #64748b; margin-top: 3px; }
    #status { background: #1e293b; margin: 8px 14px; border-radius: 8px; padding: 8px 10px; font-size: 11px; color: #94a3b8; line-height: 1.5; word-break: break-all; min-height: 32px; }
    /* Barra de progreso */
    #progressSection { display: none; margin: 0 14px 8px; background: #1e293b; border-radius: 8px; padding: 8px 10px; }
    #progressMsg { font-size: 11px; color: #7dd3fc; margin-bottom: 6px; }
    #progressTrack { background: #0f172a; border-radius: 99px; height: 6px; overflow: hidden; }
    #progressBar { height: 6px; background: linear-gradient(90deg, #2563eb, #06b6d4); border-radius: 99px; width: 0%; transition: width .3s ease; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; margin: 0 14px 10px; padding: 10px 12px; }
    .card .title { font-weight: 600; font-size: 12px; color: #f1f5f9; margin-bottom: 3px; }
    .card .meta  { font-size: 10px; color: #475569; word-break: break-all; margin-bottom: 4px; }
    .tag { display: inline-block; font-size: 10px; background: #334155; color: #94a3b8; border-radius: 4px; padding: 1px 6px; margin: 2px 2px 2px 0; }
    .field { margin: 6px 0; }
    .field label { display: block; font-size: 10px; color: #64748b; margin-bottom: 2px; }
    .field input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 5px; padding: 5px 7px; color: #e2e8f0; font-size: 11px; }
    .actions { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    button { background: #2563eb; color: white; border: none; border-radius: 6px; padding: 6px 10px; font-size: 11px; cursor: pointer; font-weight: 600; transition: background .15s; }
    button:hover { background: #1d4ed8; }
    button.secondary { background: #334155; color: #cbd5e1; }
    button.secondary:hover { background: #475569; }
    button.sm { padding: 4px 8px; font-size: 10px; }
    .log-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 14px 3px; }
    .log-header span { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .04em; }
    #log { background: #050d1a; margin: 0 14px 10px; border-radius: 8px; padding: 8px 10px; font-family: monospace; font-size: 10px; color: #475569; max-height: 100px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .top-actions { display: flex; gap: 6px; padding: 6px 14px; }
    #videos { padding-top: 4px; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    .badge-hls { background: #1e40af; color: #93c5fd; font-size: 10px; border-radius: 4px; padding: 2px 6px; margin-left: 4px; }
  </style>
</head>
<body>
<header>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="#60a5fa" stroke="none"/></svg>
  <h1>Vimeo Downloader</h1>
  <span>v6.4 &bull; ffmpeg.wasm</span>
</header>

<div class="section">
  <label>Dominio permitido</label>
  <div class="row">
    <input type="text" id="allowedHost" placeholder="www.sdaeducation.com">
    <button id="saveHost" class="sm">Guardar</button>
  </div>
  <div class="info" id="hostInfo">Dominio: sin configurar</div>
</div>

<div id="status">Iniciando...</div>

<!-- Barra de progreso conversion -->
<div id="progressSection">
  <div id="progressMsg">Preparando...</div>
  <div id="progressTrack"><div id="progressBar"></div></div>
</div>

<div class="top-actions">
  <button id="refresh">&#8635; Reescanear</button>
</div>

<div id="videos"></div>

<div class="log-header">
  <span>Actividad</span>
  <button id="clearLog" class="sm secondary">Limpiar</button>
</div>
<div id="log">Sin actividad.</div>

<script src="popup.js"></script>
</body>
</html>
