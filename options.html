<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opciones</title>
  <link rel="stylesheet" href="css/ui.css">
</head>
<body>
  <main class="wrap narrow">
    <h1>Opciones</h1>
    <p class="muted">Agrega los dominios donde la extensión puede operar. Escribe uno por línea, sin <code>https://</code> ni <code>www.</code></p>
    <label for="domains">Dominios permitidos</label>
    <textarea id="domains" rows="12" placeholder="sdaeducation.com&#10;midominio.cl&#10;otro.com"></textarea>
    <div class="actions">
      <button id="saveBtn">Guardar</button>
      <button id="resetBtn" class="secondary">Limpiar todo</button>
    </div>
    <p id="msg" class="foot"></p>
    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
    <p class="muted" style="font-size:13px">
      <strong>Ejemplo:</strong> si tu sitio es <code>www.sdaeducation.com</code>, agrega <code>sdaeducation.com</code> (sin www).
      La extensión funcionará en ese dominio y todos sus subdominios.
    </p>
  </main>
  <script src="js/options.js"></script>
</body>
</html>
